services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    volumes:
      - ./:/usr/src/app
    env_file:
      - ./.env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: postgres
    environment:
      # Используем переменные окружения (если они заданы в GitLab CI/CD, то они будут иметь приоритет)
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-ehq43hR4}  # Значение по умолчанию для локальной разработки
      POSTGRES_USER: ${DATABASE_USER:-fastapi}
      POSTGRES_DB: ${DATABASE_NAME:-fastapi}
    volumes:
      - postgres-db:/var/lib/postgresql/
      - ./sql/fastapi.sql:/docker-entrypoint-initdb.d/fastapi.sql
    ports:
      - 55432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:  # Vue frontend
    build: ./web
    ports:
      - "8080:80"  # Map host port 8080 → container port 80
    depends_on:
      - app
    env_file:
      - ./web/.env.production


volumes:
  postgres-db:
